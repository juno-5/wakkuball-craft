<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>왁뿌 스튜디오</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%;
  overflow:hidden;
  background:#f0ebe6;
  font-family: -apple-system, 'Segoe UI', sans-serif;
  touch-action:none;
  -webkit-touch-callout:none;
  -webkit-user-select:none;
  user-select:none;
}
canvas {
  display:block;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
}
#ui {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  pointer-events:none;
  z-index:10;
}

/* HOME SCREEN */
#home {
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  pointer-events:auto;
  opacity:1;
  transition: opacity 0.4s ease;
}
#home.hidden { opacity:0; pointer-events:none; }

.title {
  font-size:2.2em;
  font-weight:800;
  color:#3a2a2a;
  margin-bottom:0.2em;
  letter-spacing:-0.02em;
  text-shadow: 0 1px 2px rgba(0,0,0,0.06);
}
.subtitle {
  font-size:0.9em;
  color:rgba(80,60,60,0.5);
  margin-bottom:2em;
}

.ball-card {
  width:280px;
  background: linear-gradient(135deg, rgba(255,255,255,0.7), rgba(255,240,240,0.5));
  border:1px solid rgba(0,0,0,0.06);
  border-radius:24px;
  padding:28px 24px;
  text-align:center;
  cursor:pointer;
  transition: transform 0.2s, background 0.2s;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  box-shadow: 0 2px 20px rgba(0,0,0,0.06), 0 0 40px rgba(220,40,40,0.04);
}
.ball-card:active {
  transform:scale(0.96);
  background: rgba(255,255,255,0.85);
}
.ball-card .emoji {
  font-size:3.5em;
  margin-bottom:0.2em;
  display:block;
  animation: bobEmoji 3s ease-in-out infinite;
  filter: drop-shadow(0 2px 8px rgba(220,40,40,0.25));
}
@keyframes bobEmoji {
  0%,100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-4px) scale(1.03); }
}
.ball-card .name {
  font-size:1.3em;
  font-weight:700;
  color:#3a2a2a;
  margin-bottom:0.3em;
}
.ball-card .desc {
  font-size:0.82em;
  color:rgba(80,60,60,0.55);
  line-height:1.5;
}
.tap-hint {
  margin-top:2.5em;
  font-size:0.78em;
  color:rgba(80,60,60,0.3);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity:0.3; }
  50% { opacity:0.6; }
}

/* BACK BUTTON */
#back-btn {
  position:absolute;
  top:max(env(safe-area-inset-top, 12px), 12px);
  left:16px;
  width:44px; height:44px;
  border-radius:50%;
  background:rgba(0,0,0,0.05);
  border:1px solid rgba(0,0,0,0.08);
  color:#3a2a2a;
  font-size:1.3em;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:auto;
  cursor:pointer;
  opacity:0;
  transition: opacity 0.3s;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
}
#back-btn.show { opacity:1; }
#back-btn:active { background:rgba(0,0,0,0.1); }

/* WAX BREAKING HINT */
#wax-hint {
  position:absolute;
  bottom:max(env(safe-area-inset-bottom, 20px), 20px);
  left:50%;
  transform:translateX(-50%);
  font-size:0.82em;
  color:rgba(80,60,60,0.45);
  pointer-events:none;
  opacity:0;
  transition: opacity 0.5s;
  white-space:nowrap;
}
#wax-hint.show { opacity:1; }

/* PROGRESS BAR */
#progress-wrap {
  position:absolute;
  bottom:max(calc(env(safe-area-inset-bottom, 20px) + 36px), 56px);
  left:50%;
  transform:translateX(-50%);
  width:120px;
  height:3px;
  background:rgba(0,0,0,0.06);
  border-radius:2px;
  overflow:hidden;
  pointer-events:none;
  opacity:0;
  transition: opacity 0.5s;
}
#progress-wrap.show { opacity:1; }
#progress-bar {
  height:100%;
  width:0%;
  background:rgba(200,80,80,0.45);
  border-radius:2px;
  transition: width 0.15s;
}

/* SQUEEZE HINT */
#squeeze-hint {
  position:absolute;
  bottom:max(env(safe-area-inset-bottom, 20px), 20px);
  left:50%;
  transform:translateX(-50%);
  font-size:0.82em;
  color:rgba(80,60,60,0.45);
  pointer-events:none;
  opacity:0;
  transition: opacity 0.5s;
  white-space:nowrap;
}
#squeeze-hint.show { opacity:1; }

</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="home">
    <div class="title">왁뿌 스튜디오</div>
    <div class="subtitle">나만의 왁뿌볼을 가지고 놀자!</div>
    <div class="ball-card" onclick="app.startWaxBreaking()">
      <span class="emoji">🍎</span>
      <div class="name">사과 왁뿌볼</div>
      <div class="desc">왁스를 깨고 안에 숨은<br>말랑말랑 왁뿌볼을 찾아보세요</div>
    </div>
    <div class="tap-hint">탭하여 시작</div>
  </div>
  <div id="back-btn" onclick="app.goHome()">←</div>
  <div id="wax-hint">꾹 누르고 밀어서 왁스를 벗겨보세요! 👆</div>
  <div id="progress-wrap"><div id="progress-bar"></div></div>
  <div id="squeeze-hint">꾹 눌러서 쥐어짜 보세요! 🤏</div>
</div>

const Audio = {
  ctx: null,
  buffers: {},
  squeezeSource: null,
  squeezeGain: null,
  
  async init() {
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    const names = ['crack','squish','squeeze','crunch'];
    await Promise.all(names.map(async name => {
      try {
        const resp = await fetch(AudioData[name]);
        const arr = await resp.arrayBuffer();
        this.buffers[name] = await this.ctx.decodeAudioData(arr);
      } catch(e) {
        console.warn('Audio decode failed for', name, e);
      }
    }));
  },
  
  async resume() {
    if (this.ctx && this.ctx.state === 'suspended') {
      await this.ctx.resume();
    }
  },
  
  play(name, pitchVariation = 0) {
    if (!this.ctx || !this.buffers[name]) return;
    this.resume();
    const source = this.ctx.createBufferSource();
    source.buffer = this.buffers[name];
    const gain = this.ctx.createGain();
    gain.gain.value = 0.7;
    source.connect(gain);
    gain.connect(this.ctx.destination);
    if (pitchVariation) {
      source.playbackRate.value = 1 + (Math.random() - 0.5) * pitchVariation;
    }
    source.start(0);
    return { source, gain };
  },
  
  playCrack() {
    if (Math.random() > 0.5) {
      this.play('crack', 0.3);
    } else {
      this.play('crunch', 0.3);
    }
  },
  
  startSqueeze() {
    if (!this.ctx || !this.buffers.squeeze) return;
    this.resume();
    this.play('squish', 0.15);
    this.squeezeSource = this.ctx.createBufferSource();
    this.squeezeSource.buffer = this.buffers.squeeze;
    this.squeezeSource.loop = true;
    this.squeezeGain = this.ctx.createGain();
    this.squeezeGain.gain.value = 0;
    this.squeezeSource.connect(this.squeezeGain);
    this.squeezeGain.connect(this.ctx.destination);
    this.squeezeSource.start(0);
    // Fade in
    this.squeezeGain.gain.linearRampToValueAtTime(0.5, this.ctx.currentTime + 0.2);
  },
  
  stopSqueeze() {
    if (this.squeezeGain && this.ctx) {
      this.squeezeGain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.15);
      const src = this.squeezeSource;
      setTimeout(() => { try { src.stop(); } catch(e){} }, 200);
      this.squeezeSource = null;
      this.squeezeGain = null;
    }
  }
};

// === MATH UTILS ===
// ============================================================
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
function dist(x1, y1, x2, y2) { return Math.sqrt((x2-x1)**2 + (y2-y1)**2); }
function smoothstep(edge0, edge1, x) {
  const t = clamp((x - edge0) / (edge1 - edge0), 0, 1);
  return t * t * (3 - 2 * t);
}
function easeOutElastic(t) {
  if (t === 0 || t === 1) return t;
  return Math.pow(2, -10 * t) * Math.sin((t - 0.075) * (2 * Math.PI) / 0.3) + 1;
}
function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

// === PARTICLE SYSTEM ===
// ============================================================
const Particles = {
  items: [],
  
  emit(x, y, count, opts = {}) {
    for (let i = 0; i < count; i++) {
      const angle = opts.angle !== undefined ? opts.angle + (Math.random() - 0.5) * (opts.spread || 1) : Math.random() * Math.PI * 2;
      const speed = (opts.speed || 3) * (0.5 + Math.random());
      this.items.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        decay: (opts.decay || 0.02) + Math.random() * 0.01,
        size: (opts.size || 3) * (0.5 + Math.random()),
        color: opts.color || '#ff6644',
        gravity: opts.gravity || 0.1,
        rotation: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.2,
        shape: opts.shape || 'circle'
      });
    }
  },
  
  update() {
    for (let i = this.items.length - 1; i >= 0; i--) {
      const p = this.items[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += p.gravity;
      p.vx *= 0.99;
      p.life -= p.decay;
      p.rotation += p.rotSpeed;
      if (p.life <= 0) this.items.splice(i, 1);
    }
  },
  
  draw(ctx) {
    for (const p of this.items) {
      ctx.save();
      ctx.globalAlpha = p.life * 0.8;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      if (p.shape === 'rect') {
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.size, -p.size * 0.6, p.size * 2, p.size * 1.2);
      } else {
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(0, 0, p.size * p.life, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
  }
};

const BgParticles = {
  items: [],
  
  init(w, h) {
    this.items = [];
    for (let i = 0; i < 15; i++) {
      this.items.push({
        x: Math.random() * w,
        y: Math.random() * h,
        size: 1 + Math.random() * 1.5,
        alpha: 0.03 + Math.random() * 0.05,
        vx: (Math.random() - 0.5) * 0.15,
        vy: -0.1 - Math.random() * 0.15
      });
    }
  },
  
  update(w, h) {
    for (const p of this.items) {
      p.x += p.vx;
      p.y += p.vy;
      if (p.y < -10) { p.y = h + 10; p.x = Math.random() * w; }
      if (p.x < -10) p.x = w + 10;
      if (p.x > w + 10) p.x = -10;
    }
  },
  
  draw(ctx) {
    for (const p of this.items) {
      ctx.fillStyle = `rgba(200,170,150,${p.alpha * 0.7})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }
};

// ============================================================
// === WAX SHELL (Scratch & Peel System) ===
// ============================================================
const WaxShell = {
  radius: 0,
  cx: 0, cy: 0,
  
  // Scratch mask (offscreen canvas)
  maskCanvas: null,
  maskCtx: null,
  maskSize: 0,
  
  // Wax rendering (offscreen canvas)
  waxCanvas: null,
  waxCtx: null,
  
  // State
  pressing: false,
  lastX: 0, lastY: 0,
  brushRadius: 0,
  lastCrackSound: 0,
  onCellBroken: null,
  fallingChips: [],
  crackLines: [],
  
  // Progress
  totalPixels: 0,
  _lastProgress: 0,
  _progressDirty: true,
  _framesSinceCalc: 0,
  
  init(cx, cy, radius) {
    this.cx = cx;
    this.cy = cy;
    this.radius = radius;
    this.pressing = false;
    this.fallingChips = [];
    this.crackLines = [];
    this._lastProgress = 0;
    this._progressDirty = true;
    this._framesSinceCalc = 0;
    this.brushRadius = radius * 0.09;
    
    // Mask canvas: white = wax present, transparent = scratched away
    this.maskSize = Math.ceil(radius * 2 + 4);
    this.maskCanvas = document.createElement('canvas');
    this.maskCanvas.width = this.maskSize;
    this.maskCanvas.height = this.maskSize;
    this.maskCtx = this.maskCanvas.getContext('2d', { willReadFrequently: true });
    
    // Fill circle with white (wax present)
    this.maskCtx.clearRect(0, 0, this.maskSize, this.maskSize);
    this.maskCtx.fillStyle = '#fff';
    this.maskCtx.beginPath();
    this.maskCtx.arc(this.maskSize / 2, this.maskSize / 2, radius, 0, Math.PI * 2);
    this.maskCtx.fill();
    
    // Count total wax pixels
    const imgData = this.maskCtx.getImageData(0, 0, this.maskSize, this.maskSize);
    let count = 0;
    for (let i = 3; i < imgData.data.length; i += 4) {
      if (imgData.data[i] > 128) count++;
    }
    this.totalPixels = count;
    
    // Pre-render wax ball to offscreen canvas
    this.waxCanvas = document.createElement('canvas');
    this.waxCanvas.width = this.maskSize;
    this.waxCanvas.height = this.maskSize;
    this.waxCtx = this.waxCanvas.getContext('2d');
    this._prerenderWax();
    
    // Temp canvas for compositing (reused each frame)
    this.tempCanvas = document.createElement('canvas');
    this.tempCanvas.width = this.maskSize;
    this.tempCanvas.height = this.maskSize;
    this.tempCtx = this.tempCanvas.getContext('2d');
  },
  
  _prerenderWax() {
    const ctx = this.waxCtx;
    const S = this.maskSize;
    const R = this.radius;
    const C = S / 2; // center in local coords
    
    ctx.clearRect(0, 0, S, S);
    
    // Clip to circle
    ctx.save();
    ctx.beginPath();
    ctx.arc(C, C, R, 0, Math.PI * 2);
    ctx.clip();
    
    // Base: smooth 3D gradient
    const baseG = ctx.createRadialGradient(
      C - R * 0.35, C - R * 0.35, 0,
      C + R * 0.1, C + R * 0.1, R * 1.05
    );
    baseG.addColorStop(0, '#fce8d8');
    baseG.addColorStop(0.12, '#f4b0a0');
    baseG.addColorStop(0.28, '#e86858');
    baseG.addColorStop(0.48, '#d84838');
    baseG.addColorStop(0.68, '#c03028');
    baseG.addColorStop(0.85, '#981e20');
    baseG.addColorStop(1.0, '#6e1518');
    ctx.fillStyle = baseG;
    ctx.beginPath();
    ctx.arc(C, C, R, 0, Math.PI * 2);
    ctx.fill();
    
    // Warm bounce light
    const bounceG = ctx.createRadialGradient(
      C + R * 0.35, C + R * 0.35, 0,
      C + R * 0.2, C + R * 0.2, R * 0.8
    );
    bounceG.addColorStop(0, 'rgba(255,120,80,0.12)');
    bounceG.addColorStop(0.5, 'rgba(200,60,40,0.05)');
    bounceG.addColorStop(1, 'rgba(200,60,40,0)');
    ctx.fillStyle = bounceG;
    ctx.beginPath();
    ctx.arc(C, C, R, 0, Math.PI * 2);
    ctx.fill();
    
    // Pearlescent sheen
    const pearlG = ctx.createRadialGradient(
      C + R * 0.15, C - R * 0.2, R * 0.2,
      C, C, R
    );
    pearlG.addColorStop(0, 'rgba(255,200,220,0.08)');
    pearlG.addColorStop(0.4, 'rgba(240,180,200,0.04)');
    pearlG.addColorStop(0.7, 'rgba(180,160,200,0.03)');
    pearlG.addColorStop(1, 'rgba(180,160,200,0)');
    ctx.fillStyle = pearlG;
    ctx.beginPath();
    ctx.arc(C, C, R, 0, Math.PI * 2);
    ctx.fill();
    
    // Subtle wax texture — faint noisy spots
    for (let i = 0; i < 120; i++) {
      const a = Math.random() * Math.PI * 2;
      const r = Math.sqrt(Math.random()) * R * 0.95;
      const px = C + Math.cos(a) * r;
      const py = C + Math.sin(a) * r;
      const sz = 1 + Math.random() * 3;
      ctx.fillStyle = `rgba(${Math.random() > 0.5 ? '255,255,255' : '0,0,0'},${0.02 + Math.random() * 0.03})`;
      ctx.beginPath();
      ctx.arc(px, py, sz, 0, Math.PI * 2);
      ctx.fill();
    }
    
    ctx.restore();
  },
  
  // Convert screen coords to mask-local coords
  _toLocal(sx, sy) {
    return {
      x: sx - this.cx + this.maskSize / 2,
      y: sy - this.cy + this.maskSize / 2
    };
  },
  
  press(tx, ty) {
    const d = dist(tx, ty, this.cx, this.cy);
    if (d > this.radius * 1.05) return false;
    
    this.pressing = true;
    this.lastX = tx;
    this.lastY = ty;
    
    // Initial scratch at press point
    this._scratch(tx, ty, tx, ty);
    
    return true;
  },
  
  drag(tx, ty) {
    if (!this.pressing) return;
    
    const dx = tx - this.lastX;
    const dy = ty - this.lastY;
    const moveDist = Math.sqrt(dx * dx + dy * dy);
    
    if (moveDist > 1) {
      this._scratch(this.lastX, this.lastY, tx, ty);
      
      // Emit wax chip particles along drag
      if (Math.random() > 0.4) {
        const angle = Math.atan2(dy, dx);
        Particles.emit(tx, ty, 2 + Math.floor(Math.random() * 3), {
          color: ['#d84838','#c03028','#e86858','#981e20'][Math.floor(Math.random()*4)],
          speed: 2 + Math.random() * 3,
          size: 1.5 + Math.random() * 2.5,
          decay: 0.025 + Math.random() * 0.015,
          gravity: 0.12,
          shape: 'rect',
          angle: angle + Math.PI + (Math.random() - 0.5) * 1.5,
          spread: 1.2,
        });
      }
      
      // Spawn falling wax chips (larger pieces)
      if (moveDist > 4 && Math.random() > 0.65) {
        const angle = Math.atan2(dy, dx);
        const chipSize = this.brushRadius * (0.3 + Math.random() * 0.5);
        const numVerts = 4 + Math.floor(Math.random() * 3);
        const verts = [];
        for (let i = 0; i < numVerts; i++) {
          const a = (i / numVerts) * Math.PI * 2 + Math.random() * 0.5;
          const rv = chipSize * (0.5 + Math.random() * 0.5);
          verts.push({ x: Math.cos(a) * rv, y: Math.sin(a) * rv });
        }
        this.fallingChips.push({
          x: tx, y: ty,
          vx: Math.cos(angle + Math.PI) * (1.5 + Math.random() * 3) + (Math.random()-0.5)*2,
          vy: Math.sin(angle + Math.PI) * (1.5 + Math.random() * 3) - Math.random() * 2,
          rotation: Math.random() * Math.PI * 2,
          rotSpeed: (Math.random() - 0.5) * 0.15,
          life: 1,
          verts: verts,
          colorShift: Math.random() * 0.3 - 0.15,
        });
      }
      
      // Crack lines radiating from scratch
      if (Math.random() > 0.7) {
        const angle = Math.atan2(dy, dx) + (Math.random() - 0.5) * 2;
        this.crackLines.push({
          x: tx, y: ty,
          angle: angle,
          len: this.brushRadius * (0.8 + Math.random() * 1.5),
          life: 1,
          width: 0.8 + Math.random() * 1.2,
        });
      }
      
      // Sound
      const now = performance.now();
      if (now - this.lastCrackSound > 100) {
        Audio.playCrack();
        if (navigator.vibrate) navigator.vibrate(8);
        this.lastCrackSound = now;
      }
    }
    
    this.lastX = tx;
    this.lastY = ty;
  },
  
  release() {
    this.pressing = false;
  },
  
  _scratch(x1, y1, x2, y2) {
    const p1 = this._toLocal(x1, y1);
    const p2 = this._toLocal(x2, y2);
    
    const mctx = this.maskCtx;
    mctx.save();
    mctx.globalCompositeOperation = 'destination-out';
    
    // Draw thick line to erase wax
    mctx.lineWidth = this.brushRadius * 2;
    mctx.lineCap = 'round';
    mctx.lineJoin = 'round';
    mctx.strokeStyle = 'rgba(0,0,0,1)';
    mctx.beginPath();
    mctx.moveTo(p1.x, p1.y);
    mctx.lineTo(p2.x, p2.y);
    mctx.stroke();
    
    // Also erase a circle at the endpoint for initial press
    mctx.beginPath();
    mctx.arc(p2.x, p2.y, this.brushRadius, 0, Math.PI * 2);
    mctx.fill();
    
    // Add rough edges: random small circles along the path for organic look
    const dx = p2.x - p1.x;
    const dy = p2.y - p1.y;
    const len = Math.sqrt(dx*dx + dy*dy);
    const steps = Math.max(1, Math.floor(len / 3));
    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      const px = p1.x + dx * t;
      const py = p1.y + dy * t;
      // Random splatter around the path
      for (let j = 0; j < 3; j++) {
        const angle = Math.random() * Math.PI * 2;
        const rd = this.brushRadius * (0.6 + Math.random() * 0.7);
        const sx = px + Math.cos(angle) * rd;
        const sy = py + Math.sin(angle) * rd;
        const sr = 1 + Math.random() * this.brushRadius * 0.35;
        mctx.beginPath();
        mctx.arc(sx, sy, sr, 0, Math.PI * 2);
        mctx.fill();
      }
    }
    
    mctx.restore();
    this._progressDirty = true;
  },
  
  getProgress() {
    // Only recalculate every few frames for performance
    this._framesSinceCalc++;
    if (this._progressDirty && this._framesSinceCalc > 5) {
      this._framesSinceCalc = 0;
      this._progressDirty = false;
      const imgData = this.maskCtx.getImageData(0, 0, this.maskSize, this.maskSize);
      let remaining = 0;
      for (let i = 3; i < imgData.data.length; i += 4) {
        if (imgData.data[i] > 128) remaining++;
      }
      this._lastProgress = 1 - (remaining / this.totalPixels);
    }
    return this._lastProgress;
  },
  
  update() {
    // Update falling chips
    for (let i = this.fallingChips.length - 1; i >= 0; i--) {
      const p = this.fallingChips[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.15;
      p.vx *= 0.99;
      p.rotation += p.rotSpeed;
      p.life -= 0.012;
      if (p.life <= 0) this.fallingChips.splice(i, 1);
    }
    
    // Fade crack lines
    for (let i = this.crackLines.length - 1; i >= 0; i--) {
      this.crackLines[i].life -= 0.008;
      if (this.crackLines[i].life <= 0) this.crackLines.splice(i, 1);
    }
    
    // Check progress for callback
    const progress = this.getProgress();
    if (this.onCellBroken) {
      this.onCellBroken(progress);
    }
  },
  
  draw(ctx) {
    const CX = this.cx;
    const CY = this.cy;
    const R = this.radius;
    const S = this.maskSize;
    const originX = CX - S / 2;
    const originY = CY - S / 2;
    
    // --- Drop shadow ---
    const shG = ctx.createRadialGradient(
      CX, CY + R * 1.05, 0,
      CX, CY + R * 1.05, R * 0.5
    );
    shG.addColorStop(0, 'rgba(0,0,0,0.18)');
    shG.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = shG;
    ctx.beginPath();
    ctx.ellipse(CX, CY + R * 1.05, R * 0.5, R * 0.12, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // --- 1. Draw inner ball (always visible under scratched areas) ---
    ctx.save();
    ctx.beginPath();
    ctx.arc(CX, CY, R, 0, Math.PI * 2);
    ctx.clip();
    this._drawInnerBall(ctx);
    ctx.restore();
    
    // --- 2. Draw wax layer masked by scratch pattern ---
    const tctx = this.tempCtx;
    tctx.clearRect(0, 0, S, S);
    
    // Draw pre-rendered wax ball
    tctx.drawImage(this.waxCanvas, 0, 0);
    
    // Apply mask: only keep wax where mask has pixels
    tctx.globalCompositeOperation = 'destination-in';
    tctx.drawImage(this.maskCanvas, 0, 0);
    tctx.globalCompositeOperation = 'source-over';
    
    // Draw masked wax onto main canvas
    ctx.drawImage(this.tempCanvas, originX, originY);
    
    // --- 3. Draw scratch edge effects (depth/shadow at scratch boundaries) ---
    ctx.save();
    ctx.beginPath();
    ctx.arc(CX, CY, R, 0, Math.PI * 2);
    ctx.clip();
    // Dark shadow edge: draw wax slightly offset to create depth
    ctx.globalAlpha = 0.2;
    ctx.drawImage(this.tempCanvas, originX + 1.5, originY + 1.5);
    ctx.globalAlpha = 0.1;
    ctx.drawImage(this.tempCanvas, originX - 1, originY - 1);
    ctx.restore();
    
    // --- 4. Draw crack lines ---
    this._drawCrackLines(ctx);
    
    // --- 5. Stem and leaf ---
    this._drawStemAndLeaf(ctx);
    
    // --- 6. Specular highlights (on top) ---
    this._drawHighlights(ctx);
    
    // --- 7. Falling wax chips ---
    this._drawFallingChips(ctx);
    
    // --- 8. Press effect ---
    if (this.pressing) {
      this._drawPressEffect(ctx);
    }
  },
  
  _drawInnerBall(ctx) {
    const CX = this.cx, CY = this.cy, R = this.radius;
    
    // Vibrant pink/salmon inner ball
    const g = ctx.createRadialGradient(
      CX - R * 0.25, CY - R * 0.25, 0,
      CX, CY, R
    );
    g.addColorStop(0, '#ffbcb5');
    g.addColorStop(0.25, '#f5a099');
    g.addColorStop(0.5, '#ea8a84');
    g.addColorStop(0.75, '#d57070');
    g.addColorStop(1, '#c05e5e');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(CX, CY, R, 0, Math.PI * 2);
    ctx.fill();
    
    // Pearlescent sheen
    const sheenG = ctx.createRadialGradient(
      CX - R * 0.35, CY - R * 0.3, 0,
      CX - R * 0.1, CY - R * 0.1, R * 0.7
    );
    sheenG.addColorStop(0, 'rgba(255,230,240,0.3)');
    sheenG.addColorStop(0.4, 'rgba(255,200,210,0.1)');
    sheenG.addColorStop(1, 'rgba(255,200,210,0)');
    ctx.fillStyle = sheenG;
    ctx.beginPath();
    ctx.arc(CX, CY, R, 0, Math.PI * 2);
    ctx.fill();
    
    // Mesh texture
    ctx.strokeStyle = 'rgba(180,70,70,0.22)';
    ctx.lineWidth = 1.2;
    const meshSize = R * 0.08;
    for (let y = CY - R; y < CY + R; y += meshSize) {
      for (let x = CX - R; x < CX + R; x += meshSize) {
        const d = dist(x, y, CX, CY);
        if (d < R * 0.95) {
          const row = Math.round((y - (CY - R)) / meshSize);
          const ox = (row % 2) * meshSize * 0.5;
          ctx.beginPath();
          ctx.moveTo(x + ox, y);
          ctx.lineTo(x + ox + meshSize * 0.5, y + meshSize * 0.5);
          ctx.lineTo(x + ox - meshSize * 0.5, y + meshSize * 0.5);
          ctx.closePath();
          ctx.stroke();
        }
      }
    }
  },
  
  _drawCrackLines(ctx) {
    for (const cl of this.crackLines) {
      ctx.save();
      ctx.globalAlpha = cl.life * 0.6;
      ctx.strokeStyle = '#1a0505';
      ctx.lineWidth = cl.width;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(cl.x, cl.y);
      ctx.lineTo(
        cl.x + Math.cos(cl.angle) * cl.len,
        cl.y + Math.sin(cl.angle) * cl.len
      );
      ctx.stroke();
      ctx.restore();
    }
  },
  
  _drawStemAndLeaf(ctx) {
    const stemX = this.cx;
    const stemTopY = this.cy - this.radius;
    const stemW = this.radius * 0.035;
    const stemH = this.radius * 0.12;
    
    ctx.save();
    ctx.translate(stemX, stemTopY - stemH * 0.15);
    ctx.rotate(-0.08);
    
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.roundRect(-stemW / 2 + 1, 1, stemW, stemH, stemW * 0.4);
    ctx.fill();
    
    const stemGrad = ctx.createLinearGradient(-stemW / 2, 0, stemW / 2, 0);
    stemGrad.addColorStop(0, '#5a3820');
    stemGrad.addColorStop(0.4, '#7a5030');
    stemGrad.addColorStop(0.7, '#6b4428');
    stemGrad.addColorStop(1, '#4a2e18');
    ctx.fillStyle = stemGrad;
    ctx.beginPath();
    ctx.roundRect(-stemW / 2, 0, stemW, stemH, stemW * 0.4);
    ctx.fill();
    
    // Wax nub
    const nubR = stemW * 1.1;
    const nubY = -stemW * 0.3;
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.beginPath();
    ctx.ellipse(0.5, nubY + 0.5, nubR * 1.3, nubR * 0.7, -0.3, 0, Math.PI * 2);
    ctx.fill();
    
    const nubGrad = ctx.createRadialGradient(-nubR * 0.2, nubY - nubR * 0.3, 0, 0, nubY, nubR * 1.2);
    nubGrad.addColorStop(0, '#e86858');
    nubGrad.addColorStop(0.5, '#c83828');
    nubGrad.addColorStop(1, '#981e20');
    ctx.fillStyle = nubGrad;
    ctx.beginPath();
    ctx.ellipse(0, nubY, nubR * 1.3, nubR * 0.7, -0.3, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath();
    ctx.ellipse(-nubR * 0.3, nubY - nubR * 0.15, nubR * 0.4, nubR * 0.2, -0.3, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.restore();
    
    // Leaf
    ctx.save();
    ctx.translate(stemX + stemW * 0.5, stemTopY - stemH * 0.05);
    ctx.rotate(0.5);
    
    const leafLen = this.radius * 0.16;
    const leafWid = this.radius * 0.07;
    
    ctx.save();
    ctx.translate(1.5, 1.5);
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(leafLen * 0.5, -leafWid, leafLen, -leafWid * 0.15);
    ctx.quadraticCurveTo(leafLen * 0.5, leafWid * 0.7, 0, 0);
    ctx.fill();
    ctx.restore();
    
    const leafGrad = ctx.createLinearGradient(0, -leafWid, leafLen, 0);
    leafGrad.addColorStop(0, '#3da540');
    leafGrad.addColorStop(0.4, '#4dba50');
    leafGrad.addColorStop(0.7, '#3a9e3e');
    leafGrad.addColorStop(1, '#2d7d30');
    ctx.fillStyle = leafGrad;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(leafLen * 0.5, -leafWid, leafLen, -leafWid * 0.15);
    ctx.quadraticCurveTo(leafLen * 0.5, leafWid * 0.7, 0, 0);
    ctx.fill();
    
    ctx.strokeStyle = 'rgba(30,80,30,0.3)';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(leafLen * 0.05, 0);
    ctx.quadraticCurveTo(leafLen * 0.5, -leafWid * 0.15, leafLen * 0.9, -leafWid * 0.1);
    ctx.stroke();
    
    ctx.globalAlpha = 0.2;
    ctx.strokeStyle = 'rgba(200,255,200,0.4)';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(leafLen * 0.1, -leafWid * 0.15);
    ctx.quadraticCurveTo(leafLen * 0.4, -leafWid * 0.55, leafLen * 0.7, -leafWid * 0.25);
    ctx.stroke();
    
    ctx.restore();
  },
  
  _drawHighlights(ctx) {
    const R = this.radius;
    const CX = this.cx;
    const CY = this.cy;
    
    // SSS glow
    const sssG = ctx.createRadialGradient(
      CX - R * 0.15, CY - R * 0.15, R * 0.55,
      CX, CY, R * 1.02
    );
    sssG.addColorStop(0, 'rgba(255,100,60,0)');
    sssG.addColorStop(0.5, 'rgba(255,120,70,0.06)');
    sssG.addColorStop(0.75, 'rgba(255,140,90,0.14)');
    sssG.addColorStop(0.92, 'rgba(255,160,120,0.18)');
    sssG.addColorStop(1, 'rgba(255,140,100,0.05)');
    ctx.fillStyle = sssG;
    ctx.beginPath();
    ctx.arc(CX, CY, R, 0, Math.PI * 2);
    ctx.fill();
    
    // Primary specular
    const specGrad = ctx.createRadialGradient(
      CX - R * 0.3, CY - R * 0.35, 0,
      CX - R * 0.25, CY - R * 0.3, R * 0.5
    );
    specGrad.addColorStop(0, 'rgba(255,255,255,0.55)');
    specGrad.addColorStop(0.2, 'rgba(255,255,255,0.35)');
    specGrad.addColorStop(0.5, 'rgba(255,255,255,0.12)');
    specGrad.addColorStop(0.8, 'rgba(255,255,255,0.03)');
    specGrad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = specGrad;
    ctx.beginPath();
    ctx.arc(CX, CY, R, 0, Math.PI * 2);
    ctx.fill();
    
    // Sharp glint
    const spec2X = CX - R * 0.22;
    const spec2Y = CY - R * 0.3;
    const spec2Grad = ctx.createRadialGradient(spec2X, spec2Y, 0, spec2X, spec2Y, R * 0.15);
    spec2Grad.addColorStop(0, 'rgba(255,255,255,0.7)');
    spec2Grad.addColorStop(0.3, 'rgba(255,255,255,0.45)');
    spec2Grad.addColorStop(0.6, 'rgba(255,255,255,0.12)');
    spec2Grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = spec2Grad;
    ctx.beginPath();
    ctx.arc(CX, CY, R, 0, Math.PI * 2);
    ctx.fill();
    
    // Rim light
    ctx.save();
    ctx.beginPath();
    ctx.arc(CX, CY, R, 0, Math.PI * 2);
    ctx.clip();
    ctx.beginPath();
    ctx.arc(CX + R * 0.15, CY - R * 0.1, R * 1.02, -Math.PI * 0.45, Math.PI * 0.15);
    ctx.arc(CX + R * 0.25, CY - R * 0.15, R * 0.88, Math.PI * 0.15, -Math.PI * 0.45, true);
    ctx.closePath();
    const rimG = ctx.createLinearGradient(CX + R * 0.5, CY - R * 0.6, CX + R * 0.9, CY + R * 0.1);
    rimG.addColorStop(0, 'rgba(255,255,255,0.28)');
    rimG.addColorStop(0.5, 'rgba(255,255,255,0.12)');
    rimG.addColorStop(1, 'rgba(255,255,255,0.02)');
    ctx.fillStyle = rimG;
    ctx.fill();
    ctx.restore();
    
    // Bottom reflection
    const botRefG = ctx.createRadialGradient(CX + R * 0.05, CY + R * 0.55, 0, CX + R * 0.05, CY + R * 0.55, R * 0.4);
    botRefG.addColorStop(0, 'rgba(200,210,240,0.15)');
    botRefG.addColorStop(0.4, 'rgba(190,200,230,0.08)');
    botRefG.addColorStop(1, 'rgba(190,200,230,0)');
    ctx.fillStyle = botRefG;
    ctx.beginPath();
    ctx.arc(CX, CY, R, 0, Math.PI * 2);
    ctx.fill();
    
    // Fresnel rim
    const fresnelG = ctx.createRadialGradient(CX, CY, R * 0.82, CX, CY, R);
    fresnelG.addColorStop(0, 'rgba(255,255,255,0)');
    fresnelG.addColorStop(0.4, 'rgba(255,255,255,0)');
    fresnelG.addColorStop(0.7, 'rgba(255,235,230,0.06)');
    fresnelG.addColorStop(0.88, 'rgba(255,240,235,0.13)');
    fresnelG.addColorStop(0.96, 'rgba(255,245,240,0.18)');
    fresnelG.addColorStop(1, 'rgba(255,250,248,0.08)');
    ctx.fillStyle = fresnelG;
    ctx.beginPath();
    ctx.arc(CX, CY, R, 0, Math.PI * 2);
    ctx.fill();
    
    // Rim darkening
    const rimDarkG = ctx.createRadialGradient(CX, CY, R * 0.88, CX, CY, R);
    rimDarkG.addColorStop(0, 'rgba(0,0,0,0)');
    rimDarkG.addColorStop(0.5, 'rgba(40,0,0,0.04)');
    rimDarkG.addColorStop(1, 'rgba(40,0,0,0.12)');
    ctx.fillStyle = rimDarkG;
    ctx.beginPath();
    ctx.arc(CX, CY, R, 0, Math.PI * 2);
    ctx.fill();
  },
  
  _drawFallingChips(ctx) {
    for (const p of this.fallingChips) {
      ctx.save();
      ctx.globalAlpha = p.life;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      
      const s = 0.6 + p.life * 0.4;
      ctx.scale(s, s);
      
      const r = Math.round(210 + p.colorShift * 100);
      const g = Math.round(45 + p.colorShift * 50);
      const b = Math.round(42 + p.colorShift * 45);
      
      ctx.beginPath();
      for (let i = 0; i < p.verts.length; i++) {
        const v = p.verts[i];
        if (i === 0) ctx.moveTo(v.x, v.y);
        else ctx.lineTo(v.x, v.y);
      }
      ctx.closePath();
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.fill();
      ctx.strokeStyle = 'rgba(80,15,15,0.4)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      
      ctx.restore();
    }
  },
  
  _drawPressEffect(ctx) {
    const pg = ctx.createRadialGradient(
      this.lastX, this.lastY, 0,
      this.lastX, this.lastY, this.brushRadius * 2
    );
    pg.addColorStop(0, 'rgba(0,0,0,0.1)');
    pg.addColorStop(0.6, 'rgba(0,0,0,0.03)');
    pg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = pg;
    ctx.beginPath();
    ctx.arc(this.lastX, this.lastY, this.brushRadius * 2, 0, Math.PI * 2);
    ctx.fill();
  },
};// ============================================================
// === MESH BALL ===
// ============================================================
const MeshBall = {
  cx: 0, cy: 0, radius: 0,
  
  // Soft body: circumference points
  N: 64,
  baseR: [],
  curR: [],
  velR: [],
  
  // Diamond mesh: vertices in 2D polar grid
  gridRows: 8,  // latitude bands
  gridCols: 14, // longitude divisions
  vertices: [], // { baseX, baseY, curX, curY, vx, vy }
  cells: [],    // each diamond cell: { verts:[4 indices], bulge, targetBulge }
  
  // Interaction
  pressing: false,
  pressX: 0, pressY: 0,
  pressStrength: 0,
  
  // Animation
  revealProgress: 0,
  revealStart: 0,
  
  init(cx, cy, radius) {
    this.cx = cx;
    this.cy = cy;
    this.radius = radius;
    this.pressing = false;
    this.pressStrength = 0;
    this.revealProgress = 0;
    this.revealStart = performance.now();
    
    // Init circumference
    this.baseR = [];
    this.curR = [];
    this.velR = [];
    for (let i = 0; i < this.N; i++) {
      this.baseR.push(radius);
      this.curR.push(radius);
      this.velR.push(0);
    }
    
    // Build mesh grid as 2D array in screen space
    // Diamond lattice: offset every other row
    this.vertices = [];
    this.cells = [];
    
    const rows = this.gridRows;
    const cols = this.gridCols;
    
    // Create vertices as a grid mapped onto the circle
    // Row 0 = top, row=rows = bottom
    for (let r = 0; r <= rows; r++) {
      for (let c = 0; c < cols; c++) {
        const t = r / rows; // 0..1 top to bottom
        const yNorm = -1 + 2 * t; // -1..1
        const xWidth = Math.sqrt(Math.max(0, 1 - yNorm * yNorm)); // circle cross section
        
        // Offset every other row by half cell width
        const cOffset = (r % 2 === 1) ? 0.5 : 0;
        const xNorm = ((c + cOffset) / cols) * 2 - 1; // -1..1 wrapped
        
        // Convert to screen coords
        const bx = cx + xNorm * xWidth * radius;
        const by = cy + yNorm * radius;
        
        // Only include if inside circle
        const d = dist(bx, by, cx, cy);
        
        this.vertices.push({
          row: r, col: c,
          baseX: bx, baseY: by,
          curX: bx, curY: by,
          vx: 0, vy: 0,
          distNorm: d / radius,
          inside: d < radius * 0.95,
          angle: Math.atan2(by - cy, bx - cx),
          rNorm: d / radius,
        });
      }
    }
    
    // Create diamond cells connecting adjacent rows
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const topIdx = r * cols + c;
        const botIdx = (r + 1) * cols + c;
        const topNext = r * cols + ((c + 1) % cols);
        const botNext = (r + 1) * cols + ((c + 1) % cols);
        
        const v0 = this.vertices[topIdx];
        const v1 = this.vertices[topNext];
        const v2 = this.vertices[botIdx];
        const v3 = this.vertices[botNext];
        
        // Center of the diamond cell
        const cellCx = (v0.baseX + v1.baseX + v2.baseX + v3.baseX) / 4;
        const cellCy = (v0.baseY + v1.baseY + v2.baseY + v3.baseY) / 4;
        const cellDist = dist(cellCx, cellCy, cx, cy);
        
        if (cellDist < radius * 0.92) {
          this.cells.push({
            verts: [topIdx, topNext, botNext, botIdx], // diamond vertices
            centerX: cellCx,
            centerY: cellCy,
            distNorm: cellDist / radius,
            bulge: 0,
            targetBulge: 0,
            angle: Math.atan2(cellCy - cy, cellCx - cx),
          });
        }
      }
    }
  },
  
  press(x, y) {
    this.pressing = true;
    this.pressX = x;
    this.pressY = y;
  },
  
  move(x, y) {
    if (this.pressing) {
      this.pressX = x;
      this.pressY = y;
    }
  },
  
  release() {
    this.pressing = false;
  },
  
  update(dt) {
    // Reveal
    if (this.revealProgress < 1) {
      this.revealProgress = Math.min(1, (performance.now() - this.revealStart) / 800);
    }
    
    // Press strength
    const targetStr = this.pressing ? 1 : 0;
    this.pressStrength = lerp(this.pressStrength, targetStr, this.pressing ? 0.14 : 0.07);
    if (this.pressStrength < 0.002) this.pressStrength = 0;
    
    const pressAngle = Math.atan2(this.pressY - this.cy, this.pressX - this.cx);
    const pressDist = dist(this.pressX, this.pressY, this.cx, this.cy);
    
    // ---- Deform circumference ----
    for (let i = 0; i < this.N; i++) {
      const angle = (i / this.N) * Math.PI * 2;
      let targetR = this.baseR[i];
      
      if (this.pressStrength > 0.01) {
        let ad = angle - pressAngle;
        while (ad > Math.PI) ad -= Math.PI * 2;
        while (ad < -Math.PI) ad += Math.PI * 2;
        
        const maxDeform = this.radius * 0.38;
        const cos = Math.cos(ad);
        
        if (cos > 0) {
          // Near press: push in
          targetR -= cos * cos * maxDeform * this.pressStrength;
        } else {
          // Opposite: push out (volume)
          targetR += cos * cos * maxDeform * this.pressStrength * 0.5;
        }
      }
      
      const spring = 0.18;
      const damp = 0.72;
      const f = (targetR - this.curR[i]) * spring;
      this.velR[i] = (this.velR[i] + f) * damp;
      this.curR[i] += this.velR[i];
    }
    
    // ---- Deform mesh vertices ----
    for (const v of this.vertices) {
      // Find deformed radius at this vertex's angle
      const ai = ((v.angle / (Math.PI * 2)) * this.N + this.N) % this.N;
      const i0 = Math.floor(ai) % this.N;
      const i1 = (i0 + 1) % this.N;
      const t = ai - Math.floor(ai);
      const deformedR = lerp(this.curR[i0], this.curR[i1], t);
      const scale = deformedR / this.radius;
      
      // Target position: scale from center
      const dx = v.baseX - this.cx;
      const dy = v.baseY - this.cy;
      const targetX = this.cx + dx * scale;
      const targetY = this.cy + dy * scale;
      
      // Spring to target
      const s = 0.2;
      const d = 0.7;
      v.vx = (v.vx + (targetX - v.curX) * s) * d;
      v.vy = (v.vy + (targetY - v.curY) * s) * d;
      v.curX += v.vx;
      v.curY += v.vy;
    }
    
    // ---- Update cell bulges ----
    for (const cell of this.cells) {
      let tb = 0;
      
      if (this.pressStrength > 0.01) {
        // Cell's current center (deformed)
        const vs = cell.verts.map(i => this.vertices[i]);
        const ccx = (vs[0].curX + vs[1].curX + vs[2].curX + vs[3].curX) / 4;
        const ccy = (vs[0].curY + vs[1].curY + vs[2].curY + vs[3].curY) / 4;
        
        const dToPress = dist(ccx, ccy, this.pressX, this.pressY);
        
        // Angle from center to this cell vs press direction
        let ad = cell.angle - pressAngle;
        while (ad > Math.PI) ad -= Math.PI * 2;
        while (ad < -Math.PI) ad += Math.PI * 2;
        
        const absAd = Math.abs(ad);
        
        // Cells on the OPPOSITE side from press bulge outward
        if (absAd > Math.PI * 0.3) {
          const oppFactor = smoothstep(Math.PI * 0.3, Math.PI, absAd);
          tb = oppFactor * this.pressStrength;
          
          // Cells closer to center bulge more (more material)
          const centralFactor = 1 - cell.distNorm * 0.3;
          tb *= centralFactor;
        }
        
        // Also bulge at the SIDES (material gets pushed sideways too)
        if (absAd > Math.PI * 0.25 && absAd < Math.PI * 0.75) {
          const sideFactor = 1 - Math.abs(absAd - Math.PI * 0.5) / (Math.PI * 0.25);
          tb = Math.max(tb, sideFactor * 0.5 * this.pressStrength);
        }
        
        // Slight bulge near press edges (material squishing out at the sides of finger)
        if (absAd < Math.PI * 0.35 && dToPress > this.radius * 0.15) {
          const edgeFactor = smoothstep(this.radius * 0.15, this.radius * 0.5, dToPress);
          const nearEdgeBulge = edgeFactor * (1 - absAd / (Math.PI * 0.35)) * 0.35;
          tb = Math.max(tb, nearEdgeBulge * this.pressStrength);
        }
        
        tb = clamp(tb, 0, 1);
      }
      
      cell.targetBulge = tb;
      cell.bulge = lerp(cell.bulge, tb, this.pressing ? 0.13 : 0.07);
      if (cell.bulge < 0.003) cell.bulge = 0;
    }
  },
  
  draw(ctx) {
    const scale = easeOutCubic(this.revealProgress);
    
    ctx.save();
    ctx.translate(this.cx, this.cy);
    ctx.scale(scale, scale);
    ctx.translate(-this.cx, -this.cy);
    
    // 1. Draw base body (deformed circle)
    this._drawBody(ctx);
    
    // 2. Draw bulges (behind mesh)
    this._drawBulges(ctx);
    
    // 3. Draw mesh grid (on top)
    this._drawMesh(ctx);
    
    // 4. Highlights
    this._drawHighlight(ctx);
    
    ctx.restore();
  },
  
  _drawBody(ctx) {
    // Smooth deformed circle
    ctx.beginPath();
    for (let i = 0; i <= this.N; i++) {
      const idx = i % this.N;
      const angle = (idx / this.N) * Math.PI * 2;
      const r = this.curR[idx];
      const x = this.cx + Math.cos(angle) * r;
      const y = this.cy + Math.sin(angle) * r;
      
      if (i === 0) {
        ctx.moveTo(x, y);
      } else {
        // Smooth with quadratic curve
        const pi = (i - 1) % this.N;
        const pa = (pi / this.N) * Math.PI * 2;
        const pr = this.curR[pi];
        const px = this.cx + Math.cos(pa) * pr;
        const py = this.cy + Math.sin(pa) * pr;
        const mx = (px + x) / 2;
        const my = (py + y) / 2;
        ctx.quadraticCurveTo(px, py, mx, my);
      }
    }
    ctx.closePath();
    
    // Body gradient - pink/salmon tones
    const g = ctx.createRadialGradient(
      this.cx - this.radius * 0.15, this.cy - this.radius * 0.15, 0,
      this.cx, this.cy, this.radius * 1.1
    );
    g.addColorStop(0, '#f5a8a0');
    g.addColorStop(0.35, '#e8908a');
    g.addColorStop(0.7, '#d57878');
    g.addColorStop(1, '#c06868');
    ctx.fillStyle = g;
    ctx.fill();
    
    // Rim shadow
    const rimG = ctx.createRadialGradient(
      this.cx, this.cy, this.radius * 0.8,
      this.cx, this.cy, this.radius * 1.05
    );
    rimG.addColorStop(0, 'rgba(130,50,50,0)');
    rimG.addColorStop(1, 'rgba(130,50,50,0.18)');
    ctx.fillStyle = rimG;
    ctx.fill();
  },
  
  _drawBulges(ctx) {
    // Sort cells: draw smaller bulges first, then bigger ones on top
    const sortedCells = [...this.cells].filter(c => c.bulge > 0.02)
      .sort((a, b) => a.bulge - b.bulge);
    
    for (const cell of sortedCells) {
      const vs = cell.verts.map(i => this.vertices[i]);
      
      // Cell center (deformed)
      const ccx = (vs[0].curX + vs[1].curX + vs[2].curX + vs[3].curX) / 4;
      const ccy = (vs[0].curY + vs[1].curY + vs[2].curY + vs[3].curY) / 4;
      
      // Cell size from vertex positions
      const dx1 = vs[1].curX - vs[3].curX;
      const dy1 = vs[1].curY - vs[3].curY;
      const dx2 = vs[0].curX - vs[2].curX;
      const dy2 = vs[0].curY - vs[2].curY;
      const cellW = Math.sqrt(dx1*dx1 + dy1*dy1);
      const cellH = Math.sqrt(dx2*dx2 + dy2*dy2);
      
      const bulgeR = Math.min(cellW, cellH) * 0.48 * (0.3 + cell.bulge * 0.7);
      if (bulgeR < 2) continue;
      
      // Direction: outward from ball center
      const dirX = ccx - this.cx;
      const dirY = ccy - this.cy;
      const dirLen = Math.sqrt(dirX*dirX + dirY*dirY) || 1;
      const nx = dirX / dirLen;
      const ny = dirY / dirLen;
      
      // Protrusion offset
      const protrusion = bulgeR * cell.bulge * 1.4;
      const bx = ccx + nx * protrusion;
      const by = ccy + ny * protrusion;
      
      // Draw dome
      ctx.save();
      
      // Shadow under bulge
      ctx.fillStyle = `rgba(120,60,50,${0.12 * cell.bulge})`;
      ctx.beginPath();
      ctx.ellipse(ccx + nx * protrusion * 0.3, ccy + ny * protrusion * 0.3, 
                  bulgeR * 1.15, bulgeR * 0.95, Math.atan2(ny, nx), 0, Math.PI * 2);
      ctx.fill();
      
      // Main dome
      const dg = ctx.createRadialGradient(
        bx - nx * bulgeR * 0.2 + bulgeR * 0.12,
        by - ny * bulgeR * 0.2 - bulgeR * 0.12,
        0,
        bx, by, bulgeR * 1.1
      );
      dg.addColorStop(0, '#f5b5ad');
      dg.addColorStop(0.4, '#ea9a92');
      dg.addColorStop(0.75, '#d88580');
      dg.addColorStop(1, '#cc7872');
      
      ctx.fillStyle = dg;
      ctx.beginPath();
      ctx.ellipse(bx, by, bulgeR * 1.15, bulgeR, Math.atan2(ny, nx), 0, Math.PI * 2);
      ctx.fill();
      
      // Glossy specular on each dome
      const sg = ctx.createRadialGradient(
        bx - bulgeR * 0.22, by - bulgeR * 0.25, 0,
        bx, by, bulgeR * 0.65
      );
      sg.addColorStop(0, `rgba(255,255,255,${0.42 * cell.bulge})`);
      sg.addColorStop(0.4, `rgba(255,255,255,${0.12 * cell.bulge})`);
      sg.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = sg;
      ctx.beginPath();
      ctx.arc(bx - bulgeR * 0.1, by - bulgeR * 0.1, bulgeR * 0.7, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.restore();
    }
  },
  
  _drawMesh(ctx) {
    // Draw mesh lines connecting vertices as a diamond lattice
    const cols = this.gridCols;
    const rows = this.gridRows;
    
    const tension = 1 + this.pressStrength * 0.8;
    ctx.lineWidth = (1.2 + this.pressStrength * 0.8) * tension;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    
    // Draw each cell's diamond outline
    for (const cell of this.cells) {
      const vs = cell.verts.map(i => this.vertices[i]);
      
      // Color: darker where bulging (mesh digs in)
      const alpha = 0.3 + cell.bulge * 0.45 + this.pressStrength * 0.1;
      ctx.strokeStyle = `rgba(130,70,60,${Math.min(alpha, 0.85)})`;
      ctx.lineWidth = (1.0 + cell.bulge * 1.5 + this.pressStrength * 0.5);
      
      ctx.beginPath();
      ctx.moveTo(vs[0].curX, vs[0].curY);
      ctx.lineTo(vs[1].curX, vs[1].curY);
      ctx.lineTo(vs[2].curX, vs[2].curY);
      ctx.lineTo(vs[3].curX, vs[3].curY);
      ctx.closePath();
      ctx.stroke();
    }
  },
  
  _drawHighlight(ctx) {
    // Overall soft specular
    const hlX = this.cx - this.radius * 0.25;
    const hlY = this.cy - this.radius * 0.28;
    const g = ctx.createRadialGradient(hlX, hlY, 0, hlX, hlY, this.radius * 0.55);
    g.addColorStop(0, 'rgba(255,255,255,0.14)');
    g.addColorStop(0.4, 'rgba(255,255,255,0.05)');
    g.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(this.cx, this.cy, this.radius * 1.15, 0, Math.PI * 2);
    ctx.fill();
    
    // Drop shadow under ball
    const shG = ctx.createRadialGradient(
      this.cx, this.cy + this.radius * 1.1, 0,
      this.cx, this.cy + this.radius * 1.1, this.radius * 0.5
    );
    shG.addColorStop(0, 'rgba(0,0,0,0.15)');
    shG.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = shG;
    ctx.beginPath();
    ctx.ellipse(this.cx, this.cy + this.radius * 1.1, this.radius * 0.5, this.radius * 0.12, 0, 0, Math.PI * 2);
    ctx.fill();
  },
  
  isInside(x, y) {
    return dist(x, y, this.cx, this.cy) < this.radius * 1.15;
  }
};

// ============================================================
// === CELEBRATION EFFECT ===
// ============================================================
const Celebration = {
  active: false,
  startTime: 0,
  
  start() {
    this.active = true;
    this.startTime = performance.now();
    // Big burst of particles
    const cx = app.W / 2;
    const cy = app.H / 2;
    for (let i = 0; i < 30; i++) {
      Particles.emit(cx, cy, 1, {
        color: ['#ff6655','#ff9977','#ffcc88','#fff'][Math.floor(Math.random()*4)],
        speed: 6 + Math.random() * 6,
        size: 3 + Math.random() * 3,
        decay: 0.01 + Math.random() * 0.01,
        gravity: 0.08,
      });
    }
  },
  
  isDone() {
    return this.active && (performance.now() - this.startTime > 1200);
  }
};

// ============================================================
// === APP ===
// ============================================================
const app = {
  canvas: null,
  ctx: null,
  W: 0, H: 0, dpr: 1,
  state: 'home', // home, waxBreaking, celebration, playing
  ballRadius: 0,
  ballCX: 0, ballCY: 0,
  audioInitialized: false,
  waxHintShown: false,
  squeezeHintShown: false,
  squeezeHintTimer: 0,
  lastTime: 0,
  transitionAlpha: 0,
  transitionTarget: 0,
  
  init() {
    this.canvas = document.getElementById('c');
    this.ctx = this.canvas.getContext('2d');
    
    this.resize();
    window.addEventListener('resize', () => this.resize());
    
    // Input
    this.canvas.addEventListener('touchstart', e => this.onTouchStart(e), { passive: false });
    this.canvas.addEventListener('touchmove', e => this.onTouchMove(e), { passive: false });
    this.canvas.addEventListener('touchend', e => this.onTouchEnd(e), { passive: false });
    this.canvas.addEventListener('mousedown', e => this.onMouseDown(e));
    this.canvas.addEventListener('mousemove', e => this.onMouseMove(e));
    this.canvas.addEventListener('mouseup', e => this.onMouseUp(e));
    
    BgParticles.init(this.W, this.H);
    
    this.lastTime = performance.now();
    requestAnimationFrame(t => this.loop(t));
  },
  
  resize() {
    this.dpr = Math.min(window.devicePixelRatio || 1, 2.5);
    this.W = window.innerWidth;
    this.H = window.innerHeight;
    this.canvas.width = this.W * this.dpr;
    this.canvas.height = this.H * this.dpr;
    this.canvas.style.width = this.W + 'px';
    this.canvas.style.height = this.H + 'px';
    
    this.ballRadius = Math.min(this.W, this.H) * 0.35;
    this.ballCX = this.W / 2;
    this.ballCY = this.H / 2;
    
    BgParticles.init(this.W, this.H);
  },
  
  async initAudio() {
    if (!this.audioInitialized) {
      this.audioInitialized = true;
      await Audio.init();
    }
    Audio.resume();
  },
  
  startWaxBreaking() {
    this.initAudio();
    this.state = 'waxBreaking';
    document.getElementById('home').classList.add('hidden');
    document.getElementById('back-btn').classList.add('show');
    
    WaxShell.init(this.ballCX, this.ballCY, this.ballRadius);
    
    // Set up completion check callback
    WaxShell.onCellBroken = (progress) => {
      document.getElementById('progress-bar').style.width = (progress * 100) + '%';
      if (progress >= 0.75 && this.state === 'waxBreaking') {
        this.state = 'celebration';
        Celebration.start();
        setTimeout(() => this.startPlaying(), 1000);
      }
    };
    
    // Show hint after brief delay
    setTimeout(() => {
      if (this.state === 'waxBreaking') {
        document.getElementById('wax-hint').classList.add('show');
        document.getElementById('progress-wrap').classList.add('show');
        this.waxHintShown = true;
      }
    }, 600);
  },
  
  startPlaying() {
    this.state = 'playing';
    document.getElementById('wax-hint').classList.remove('show');
    document.getElementById('progress-wrap').classList.remove('show');
    
    MeshBall.init(this.ballCX, this.ballCY, this.ballRadius);
    
    setTimeout(() => {
      if (this.state === 'playing') {
        document.getElementById('squeeze-hint').classList.add('show');
        this.squeezeHintTimer = performance.now();
      }
    }, 800);
  },
  
  goHome() {
    this.state = 'home';
    document.getElementById('home').classList.remove('hidden');
    document.getElementById('back-btn').classList.remove('show');
    document.getElementById('wax-hint').classList.remove('show');
    document.getElementById('progress-wrap').classList.remove('show');
    document.getElementById('squeeze-hint').classList.remove('show');
    MeshBall.release();
    WaxShell.release();
    Audio.stopSqueeze();
    Particles.items = [];
    WaxShell.fallingChips = [];
    WaxShell.crackLines = [];
  },
  
  getXY(e) {
    if (e.touches) {
      return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }
    return { x: e.clientX, y: e.clientY };
  },
  
  onTouchStart(e) {
    e.preventDefault();
    this.initAudio();
    const { x, y } = this.getXY(e);
    this.handlePress(x, y);
  },
  
  onTouchMove(e) {
    e.preventDefault();
    if (e.touches.length > 0) {
      this.handleMove(e.touches[0].clientX, e.touches[0].clientY);
    }
  },
  
  onTouchEnd(e) {
    e.preventDefault();
    this.handleRelease();
  },
  
  onMouseDown(e) {
    this.initAudio();
    this.handlePress(e.clientX, e.clientY);
  },
  
  onMouseMove(e) {
    this.handleMove(e.clientX, e.clientY);
  },
  
  onMouseUp(e) {
    this.handleRelease();
  },
  
  handlePress(x, y) {
    if (this.state === 'waxBreaking') {
      const hit = WaxShell.press(x, y);
      if (hit) {
        // Hide hint after first interaction
        if (this.waxHintShown) {
          document.getElementById('wax-hint').classList.remove('show');
          this.waxHintShown = false;
        }
      }
    } else if (this.state === 'playing') {
      if (MeshBall.isInside(x, y)) {
        MeshBall.press(x, y);
        Audio.startSqueeze();
        if (navigator.vibrate) navigator.vibrate(10);
        
        // Hide squeeze hint
        document.getElementById('squeeze-hint').classList.remove('show');
      }
    }
  },
  
  handleMove(x, y) {
    if (this.state === 'waxBreaking') {
      WaxShell.drag(x, y);
    } else if (this.state === 'playing') {
      MeshBall.move(x, y);
    }
  },
  
  handleRelease() {
    if (this.state === 'waxBreaking') {
      WaxShell.release();
    } else if (this.state === 'playing') {
      MeshBall.release();
      Audio.stopSqueeze();
    }
  },
  
  loop(time) {
    const dt = Math.min(time - this.lastTime, 33) / 16.67;
    this.lastTime = time;
    
    const ctx = this.ctx;
    ctx.save();
    ctx.scale(this.dpr, this.dpr);
    
    // Clear
    ctx.fillStyle = '#f0ebe6';
    ctx.fillRect(0, 0, this.W, this.H);
    
    // Background particles
    BgParticles.update(this.W, this.H);
    BgParticles.draw(ctx);
    
    // State-specific rendering
    if (this.state === 'waxBreaking') {
      WaxShell.update();
      WaxShell.draw(ctx);
    } else if (this.state === 'celebration') {
      WaxShell.update();
      WaxShell.draw(ctx);
      if (Celebration.isDone()) {
        // Already transitioning
      }
    } else if (this.state === 'playing') {
      MeshBall.update(dt);
      MeshBall.draw(ctx);
    }
    
    // Particles always
    Particles.update();
    Particles.draw(ctx);
    
    ctx.restore();
    
    requestAnimationFrame(t => this.loop(t));
  }
};

// === INIT ===
app.init();
</script>
</body>
</html>
