          i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        break;
      }
      case 'peach': {
        for (let i = 0; i < pts; i++) {
          const a = (i / pts) * Math.PI * 2 - Math.PI / 2;
          const sinA = Math.sin(a);
          const rr = sinA < 0
            ? r * (1.0 + sinA * 0.12 * (1 - deform))
            : r * (1.0 + sinA * 0.12 * (1 - deform));
          const px = cx + Math.cos(a) * rr;
          const py = cy + Math.sin(a) * rr;
          i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        break;
      }
      case 'strawberry': {
        for (let i = 0; i < pts; i++) {
          const a = (i / pts) * Math.PI * 2 - Math.PI / 2;
          const sinA = Math.sin(a);   // -1 top, +1 bottom
          const rr = r * (1.0 - sinA * 0.18 * (1 - deform));  // top wider, bottom narrower
          const px = cx + Math.cos(a) * rr;
          const py = cy + Math.sin(a) * rr;
          i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        break;
      }
      case 'lemon': {
        for (let i = 0; i < pts; i++) {
          const a = (i / pts) * Math.PI * 2;
          const xr = r * (1.0 + 0.30 * (1 - deform));   // wider horizontally
          const yr = r * (1.0 - 0.20 * (1 - deform));   // shorter vertically
          const px = cx + Math.cos(a) * xr;
          const py = cy + Math.sin(a) * yr;
          i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        break;
      }
      case 'grape': {
        // Three bumps: lower-left, lower-right, top centre
        const bumpAngles = [Math.PI * 7/6, Math.PI * 11/6, -Math.PI / 2];
        for (let i = 0; i < pts; i++) {
          const a = (i / pts) * Math.PI * 2;
          let maxBump = 0;
          bumpAngles.forEach(ba => {
            let diff = a - ba;
            while (diff >  Math.PI) diff -= 2 * Math.PI;
            while (diff < -Math.PI) diff += 2 * Math.PI;
            const d = Math.abs(diff);
            if (d < 0.9) maxBump = Math.max(maxBump, 0.16 * (1 - d / 0.9));
          });
          const rr = r * (1.0 + maxBump * (1 - deform));
          const px = cx + Math.cos(a) * rr;
          const py = cy + Math.sin(a) * rr;
          i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        break;
      }
      default: {
        // Circle fallback for blob, cat, rabbit, bear, donut, cupcake, cake
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        break;
      }
    }
    ctx.closePath();
  }

  /**
   * Draw a 3D-shaded fruit-shape preview onto a standalone canvas context.
   * Used for variant card swatches.
   */
  _drawVariantSwatch(ctx, cx, cy, r, variant) {
    const shape = variant.shape || 'blob';
    const col   = variant.wax   || '#f5d76e';
    const colDk = variant.waxDk || '#d4a017';
    const colHi = variant.waxHi || _lighten(col, 45);

    ctx.save();

    // Fruit silhouette fill
    this._fruitPath(ctx, cx, cy, r, shape);
    const fillG = ctx.createRadialGradient(cx - r * 0.28, cy - r * 0.28, 0, cx, cy, r * 1.05);
    fillG.addColorStop(0,    colHi);
    fillG.addColorStop(0.45, col);
    fillG.addColorStop(1,    colDk);
    ctx.fillStyle = fillG;
    ctx.fill();

    // 3-D sphere shading
    const shadeG = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
    shadeG.addColorStop(0,   'rgba(255,255,255,0)');
    shadeG.addColorStop(0.7, 'rgba(0,0,0,0)');
    shadeG.addColorStop(1,   'rgba(0,0,0,0.30)');
    this._fruitPath(ctx, cx, cy, r, shape);
    ctx.fillStyle = shadeG;
    ctx.fill();

    // Specular highlight
    const specG = ctx.createRadialGradient(cx - r * 0.30, cy - r * 0.36, 0, cx - r * 0.22, cy - r * 0.25, r * 0.45);
    specG.addColorStop(0,   'rgba(255,255,255,0.80)');
    specG.addColorStop(0.4, 'rgba(255,255,255,0.18)');
    specG.addColorStop(1,   'rgba(255,255,255,0)');
    this._fruitPath(ctx, cx, cy, r, shape);
    ctx.fillStyle = specG;
    ctx.fill();

    // Peach: draw a subtle cleft line
    if (shape === 'peach') {
      ctx.beginPath();
      ctx.moveTo(cx, cy - r * 0.75);
      ctx.bezierCurveTo(cx - r * 0.04, cy - r * 0.2, cx - r * 0.04, cy + r * 0.2, cx, cy + r * 0.75);
      ctx.strokeStyle = 'rgba(0,0,0,0.18)';
      ctx.lineWidth   = 2.5;
      ctx.lineCap     = 'round';
      ctx.stroke();
    }

    // Strawberry: tiny seed dots
    if (shape === 'strawberry') {
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      for (let s = 0; s < 8; s++) {
        const sa = -0.5 + s * 0.55;
        const sd = r * (0.25 + (s % 3) * 0.18);
        const sx = cx + Math.cos(sa + Math.PI * 0.9) * sd * 0.6;
        const sy = cy + Math.sin(sa + Math.PI * 0.9) * sd;
        ctx.beginPath();
        ctx.arc(sx, sy, 1.8, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Grape: small sub-circles to suggest grape cluster detail
    if (shape === 'grape') {
      const bumpAngles = [Math.PI * 7/6, Math.PI * 11/6, -Math.PI / 2];
      bumpAngles.forEach(ba => {
        const bx = cx + Math.cos(ba) * r * 0.55;
        const by = cy + Math.sin(ba) * r * 0.55;
        ctx.beginPath();
        ctx.arc(bx, by, r * 0.28, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(0,0,0,0.12)';
        ctx.lineWidth = 1.5;
        ctx.stroke();
      });
    }

    // Apple: tiny stem
    if (shape === 'apple') {
      ctx.beginPath();
      ctx.moveTo(cx, cy - r * 0.95);
      ctx.bezierCurveTo(cx - r * 0.02, cy - r * 1.12, cx + r * 0.18, cy - r * 1.18, cx + r * 0.14, cy - r * 1.28);
      ctx.strokeStyle = '#5a3a1a';
      ctx.lineWidth   = 2.2;
      ctx.lineCap     = 'round';
      ctx.stroke();
      // Small leaf
      ctx.beginPath();
      ctx.ellipse(cx + r * 0.08, cy - r * 1.08, r * 0.14, r * 0.08, -0.6, 0, Math.PI * 2);
      ctx.fillStyle = '#4a8a2a';
      ctx.fill();
    }

    ctx.restore();
  }

  _hexPath(ctx, x, y, r) {
    for (let i = 0; i < 6; i++) {
      const a  = (Math.PI / 3) * i - Math.PI / 6;
      const px = x + r * Math.cos(a);
      const py = y + r * Math.sin(a);
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath();
  }

  // ──────────────────────────────────────────────────────────
  // WAKKUBALL (MESH) RENDERER  ← most important visual
  // ──────────────────────────────────────────────────────────
  _drawWakkuball() {
    if (!this.body) return;
    const ctx  = this.ctx;
    const body = this.body;
    const t    = performance.now() / 1000;
    const cx   = body.cx, cy = body.cy, r = body.radius;

    this._drawShadow(cx, cy, r);

    // ── Inner filling (soft body silhouette) ─────────────────
    ctx.save();
    ctx.beginPath();
    body.buildPath(ctx);
    const fillG = ctx.createRadialGradient(cx - r * 0.28, cy - r * 0.28, 0, cx, cy, r * 1.05);
    fillG.addColorStop(0,   _lighten(body.color, 55));
    fillG.addColorStop(0.45, body.color);
    fillG.addColorStop(1,   _darken(body.color, 45));
    ctx.fillStyle = fillG;
    ctx.fill();
    ctx.restore();

    // ── Mesh bulge effect ────────────────────────────────────
    // Where the user presses, filling pushes through mesh holes
    if (this.pressActive && this.pressPoint) {
      const px    = this.pressPoint.x;
      const py    = this.pressPoint.y;
      const pdist = Math.hypot(px - cx, py - cy);
      const press = body.pressure || 0; // 0‥1

      if (pdist < r * 1.15 && press > 0.05) {
        const bulgeRadius  = r * 0.18;
        const bulgeCount   = 7;
        const spreadRadius = r * 0.55 * press;
        const pAngle       = Math.atan2(py - cy, px - cx);

        for (let i = 0; i < bulgeCount; i++) {
          const ba   = pAngle + (i / bulgeCount) * Math.PI * 2;
          const bDist = spreadRadius * (0.55 + 0.45 * (i % 2));
          const bx   = cx + Math.cos(ba) * bDist;
          const by_  = cy + Math.sin(ba) * bDist;
          const br   = bulgeRadius * press * (0.7 + 0.3 * Math.sin(t * 6 + i));

          // Clip to body silhouette for inner bulges
          ctx.save();
          ctx.beginPath();
          body.buildPath(ctx);
          ctx.clip();

          // Bulge ball
          const bg = ctx.createRadialGradient(bx - br * 0.3, by_ - br * 0.3, 0, bx, by_, br);
          bg.addColorStop(0,   _lighten(body.color, 65));
          bg.addColorStop(0.5, _lighten(body.color, 25));
          bg.addColorStop(1,   _darken(body.color, 20));
          ctx.beginPath();
          ctx.arc(bx, by_, br, 0, Math.PI * 2);
          ctx.fillStyle = bg;
          ctx.fill();
          ctx.restore();

          // Outer bulge (pushing through mesh holes)
          const outerStrength = Math.max(0, 1 - pdist / r) * press;
          if (outerStrength > 0.1) {
            const obr = br * 0.65 * outerStrength;
            const obx = cx + Math.cos(ba) * (r * 0.93);
            const oby = cy + Math.sin(ba) * (r * 0.93);
            const obg = ctx.createRadialGradient(obx - obr * 0.3, oby - obr * 0.3, 0, obx, oby, obr);
            obg.addColorStop(0,   _lighten(body.color, 70));
            obg.addColorStop(0.6, body.color);
            obg.addColorStop(1,   _darken(body.color, 30));
            ctx.save();
            ctx.beginPath();
            ctx.arc(obx, oby, obr, 0, Math.PI * 2);
            ctx.fillStyle = obg;
            ctx.shadowColor = body.color;
            ctx.shadowBlur  = 8;
            ctx.fill();
            ctx.restore();
          }
        }
      }
    }

    // ── Mesh net (hexagonal grid overlay) ────────────────────
    ctx.save();
    ctx.beginPath();
    body.buildPath(ctx);
    ctx.clip();

    const meshSize = r * 0.18;
    const meshCols = Math.ceil(r * 2.2 / (meshSize * 1.5)) + 2;
    const meshRows = Math.ceil(r * 2.2 / (meshSize * Math.sqrt(3))) + 2;

    for (let row = -1; row < meshRows; row++) {
      for (let col = -1; col < meshCols; col++) {
        const hx   = cx - r + col * meshSize * 1.5;
        const hy   = cy - r + row * meshSize * Math.sqrt(3) + (col % 2 === 0 ? 0 : meshSize * Math.sqrt(3) * 0.5);
        const dist = Math.hypot(hx - cx, hy - cy);
        if (dist > r * 1.05) continue;

        // Mesh strand
        ctx.beginPath();
        this._hexPath(ctx, hx, hy, meshSize * 0.5);
        ctx.strokeStyle = 'rgba(0,0,0,0.28)';
        ctx.lineWidth   = 1.8;
        ctx.stroke();
        ctx.strokeStyle = 'rgba(255,255,255,0.12)';
        ctx.lineWidth   = 0.7;
        ctx.stroke();
      }
    }
    ctx.restore();

    // ── Inner fruit decoration ──────────────────────────────
    if (this.variant?.emoji) {
      ctx.save();
      ctx.beginPath();
      body.buildPath(ctx);
      ctx.clip();
      ctx.font = `${Math.round(r * 0.55)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.globalAlpha = 0.12;
      ctx.fillText(this.variant.emoji, cx - r*0.2, cy - r*0.15);
      ctx.fillText(this.variant.emoji, cx + r*0.25, cy + r*0.2);
      ctx.restore();
    }

    // ── Mesh 3-D shading ─────────────────────────────────────
    ctx.save();
    ctx.beginPath();
    body.buildPath(ctx);
    const meshShade = ctx.createRadialGradient(cx - r * 0.3, cy - r * 0.3, 0, cx, cy, r);
    meshShade.addColorStop(0,   'rgba(255,255,255,0.10)');
    meshShade.addColorStop(0.6, 'rgba(0,0,0,0.0)');
    meshShade.addColorStop(1,   'rgba(0,0,0,0.40)');
    ctx.fillStyle = meshShade;
    ctx.fill();
    ctx.restore();

    // ── Specular highlight ───────────────────────────────────
    const spec = ctx.createRadialGradient(cx - r * 0.33, cy - r * 0.40, 0, cx - r * 0.28, cy - r * 0.33, r * 0.38);
    spec.addColorStop(0,   'rgba(255,255,255,0.60)');
    spec.addColorStop(0.5, 'rgba(255,255,255,0.12)');
    spec.addColorStop(1,   'rgba(255,255,255,0)');
    ctx.save();
    ctx.beginPath();
    body.buildPath(ctx);
    ctx.fillStyle = spec;
    ctx.fill();
    ctx.restore();
  }

  // ──────────────────────────────────────────────────────────
  // SQUISHY RENDERER
  // ──────────────────────────────────────────────────────────
  _drawSquishy() {
    if (!this.body) return;
    const ctx  = this.ctx;
    const body = this.body;
    const t    = performance.now() / 1000;
    const cx   = body.cx, cy = body.cy, r = body.radius;
    const v    = this.variant || {};
    const col  = v.wax || '#ffb3c6';

    this._drawShadow(cx, cy, r);

    // ── Main shape ───────────────────────────────────────────
    ctx.save();
    ctx.beginPath();
    body.buildPath(ctx);
    const sg = ctx.createRadialGradient(cx - r * 0.25, cy - r * 0.25, 0, cx, cy, r);
    sg.addColorStop(0,   _lighten(col, 60));
    sg.addColorStop(0.55, col);
    sg.addColorStop(1,   _darken(col, 50));
    ctx.fillStyle = sg;
    ctx.fill();

    // ── Indent / press dent ──────────────────────────────────
    if (this.pressActive && this.pressPoint) {
      const px   = this.pressPoint.x - cx;
      const py   = this.pressPoint.y - cy;
      const pdst = Math.hypot(px, py);
      if (pdst < r) {
        const dg = ctx.createRadialGradient(
          this.pressPoint.x, this.pressPoint.y, 0,
          this.pressPoint.x, this.pressPoint.y, r * 0.35
        );
        dg.addColorStop(0,   'rgba(0,0,0,0.22)');
        dg.addColorStop(1,   'rgba(0,0,0,0)');
        ctx.fillStyle = dg;
        ctx.fill();
      }
    }

    // ── Frosting detail (donut, cake etc.) ───────────────────
    if (v.id === 'donut' || v.id === 'cake' || v.id === 'cupcake') {
      const fg = ctx.createLinearGradient(cx - r * 0.6, cy - r * 0.2, cx + r * 0.6, cy + r * 0.2);
      fg.addColorStop(0, 'rgba(255,255,255,0.65)');
      fg.addColorStop(1, 'rgba(255,200,220,0.45)');
      ctx.beginPath();
      ctx.ellipse(cx, cy - r * 0.18, r * 0.6, r * 0.3, -0.1, 0, Math.PI * 2);
      ctx.fillStyle = fg;
      ctx.fill();

      // Sprinkles
      const sprinkleColors = ['#ff6b6b','#feca57','#48dbfb','#ff9ff3','#54a0ff'];
      for (let i = 0; i < 14; i++) {
        const sa   = (i / 14) * Math.PI * 2;
        const sd   = r * (0.25 + (i % 3) * 0.12);
        const sx_  = cx + Math.cos(sa) * sd * 0.9;
        const sy_  = cy - r * 0.18 + Math.sin(sa) * sd * 0.45;
        ctx.save();
        ctx.translate(sx_, sy_);
        ctx.rotate(sa + 0.4);
        ctx.fillStyle = sprinkleColors[i % sprinkleColors.length];
        ctx.fillRect(-5, -2, 10, 4);
        ctx.restore();
      }
    }

    // ── Donut hole ───────────────────────────────────────────
    if (v.id === 'donut') {
      const holeG = ctx.createRadialGradient(cx, cy + r * 0.05, 0, cx, cy + r * 0.05, r * 0.22);
      holeG.addColorStop(0, 'rgba(10,5,16,0.85)');
      holeG.addColorStop(0.7, 'rgba(10,5,16,0.5)');
      holeG.addColorStop(1, 'rgba(10,5,16,0)');
      ctx.beginPath();
      ctx.arc(cx, cy + r * 0.05, r * 0.22, 0, Math.PI * 2);
      ctx.fillStyle = holeG;
      ctx.fill();
    }

    // ── Cupcake wrapper ──────────────────────────────────────
    if (v.id === 'cupcake') {
      ctx.save();
      ctx.beginPath();
      body.buildPath(ctx);
      ctx.clip();
      // Paper wrapper bottom half
      const wrapY = cy + r * 0.1;
      for (let i = 0; i < 12; i++) {
        const wx1 = cx - r * 0.8 + i * r * 0.133;
        const wx2 = wx1 + r * 0.067;
        ctx.beginPath();
        ctx.moveTo(wx1, wrapY);
        ctx.lineTo(wx2, wrapY);
        ctx.lineTo(wx2, cy + r * 0.9);
        ctx.lineTo(wx1, cy + r * 0.9);
        ctx.closePath();
        ctx.fillStyle = i % 2 === 0 ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.05)';
        ctx.fill();
      }
      // Cherry on top
      ctx.beginPath();
      ctx.arc(cx, cy - r * 0.55, r * 0.12, 0, Math.PI * 2);
      ctx.fillStyle = '#ff4466';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx - r * 0.03, cy - r * 0.58, r * 0.04, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.fill();
      ctx.restore();
    }

    // ── Cake layers ──────────────────────────────────────────
    if (v.id === 'cake') {
      ctx.save();
      ctx.beginPath();
      body.buildPath(ctx);
      ctx.clip();
      // Layer lines
      [0.15, -0.15].forEach(yOff => {
        ctx.beginPath();
        ctx.moveTo(cx - r * 0.8, cy + r * yOff);
        ctx.lineTo(cx + r * 0.8, cy + r * yOff);
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.lineWidth = 2;
        ctx.stroke();
      });
      // Candles
      for (let c = 0; c < 3; c++) {
        const candleX = cx + (c - 1) * r * 0.3;
        ctx.fillStyle = ['#ff6b6b','#feca57','#48dbfb'][c];
        ctx.fillRect(candleX - 3, cy - r * 0.5, 6, r * 0.3);
        // Flame
        ctx.beginPath();
        ctx.ellipse(candleX, cy - r * 0.55, 4, 7, 0, 0, Math.PI * 2);
        ctx.fillStyle = '#ffcc00';
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(candleX, cy - r * 0.56, 2, 4, 0, 0, Math.PI * 2);
        ctx.fillStyle = '#ffffff';
        ctx.globalAlpha = 0.7;
        ctx.fill();
        ctx.globalAlpha = 1;
      }
      ctx.restore();
    }

    // ── Specular ─────────────────────────────────────────────
    const spec = ctx.createRadialGradient(cx - r * 0.3, cy - r * 0.38, 0, cx, cy, r);
    spec.addColorStop(0,   'rgba(255,255,255,0.70)');
    spec.addColorStop(0.3, 'rgba(255,255,255,0.10)');
    spec.addColorStop(1,   'rgba(255,255,255,0)');
    ctx.fillStyle = spec;
    ctx.fill();
    ctx.restore();
  }

  // ──────────────────────────────────────────────────────────
  // MALLANGI RENDERER
  // ──────────────────────────────────────────────────────────
  _drawMallangi() {
    if (!this.body) return;
    const ctx  = this.ctx;
    const body = this.body;
    const t    = performance.now() / 1000;
    const cx   = body.cx, cy = body.cy, r = body.radius;
    const col  = this.variant?.wax || '#a29bfe';

    this._drawShadow(cx, cy * 1.02, r * (body.stretchY || 1));

    // ── Jelly body ───────────────────────────────────────────
    ctx.save();
    ctx.beginPath();
    body.buildPath(ctx);
    const jg = ctx.createRadialGradient(cx - r * 0.22, cy - r * 0.22, 0, cx, cy, r * 1.1);
    jg.addColorStop(0,   _lighten(col, 55) + 'cc');
    jg.addColorStop(0.5, col + 'aa');
    jg.addColorStop(1,   _darken(col, 40) + 'dd');
    ctx.fillStyle = jg;
    ctx.fill();

    // ── Translucent inner glow ────────────────────────────────
    const ig = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 0.6);
    ig.addColorStop(0,   _lighten(col, 80) + '55');
    ig.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = ig;
    ctx.fill();
    ctx.restore();

    // ── Face ─────────────────────────────────────────────────
    ctx.save();
    ctx.beginPath();
    body.buildPath(ctx);
    ctx.clip();

    const eyeR  = r * 0.09;
    const eyeY  = cy - r * 0.08;
    const eyeOff = r * 0.22;

    // Eyes
    [-1, 1].forEach(side => {
      const ex = cx + side * eyeOff;
      ctx.beginPath();
      ctx.ellipse(ex, eyeY, eyeR, eyeR * 1.15, 0, 0, Math.PI * 2);
      ctx.fillStyle = '#2d2030';
      ctx.fill();
      // Eye shine
      ctx.beginPath();
      ctx.arc(ex - eyeR * 0.25, eyeY - eyeR * 0.28, eyeR * 0.28, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.fill();
    });

    // Blush
    [-1, 1].forEach(side => {
      ctx.save();
      ctx.globalAlpha = 0.35;
      ctx.beginPath();
      ctx.ellipse(cx + side * eyeOff * 1.4, eyeY + eyeR * 1.8, eyeR * 1.1, eyeR * 0.55, 0, 0, Math.PI * 2);
      ctx.fillStyle = '#ff7eb3';
      ctx.fill();
      ctx.restore();
    });

    // Smile
    ctx.beginPath();
    ctx.arc(cx, eyeY + r * 0.22, r * 0.14, 0.15, Math.PI - 0.15);
    ctx.strokeStyle = '#2d2030';
    ctx.lineWidth   = eyeR * 0.9;
    ctx.lineCap     = 'round';
    ctx.stroke();

    // ── Animal-specific features ─────────────────────────────
    const vid = this.variant?.id;
    if (vid === 'cat') {
      // Cat ears (triangles)
      [-1, 1].forEach(side => {
        ctx.beginPath();
        const earX = cx + side * r * 0.45;
        const earY = cy - r * 0.75;
        ctx.moveTo(earX, earY);
        ctx.lineTo(earX + side * r * 0.28, earY + r * 0.38);
        ctx.lineTo(earX - side * r * 0.08, earY + r * 0.35);
        ctx.closePath();
        ctx.fillStyle = col;
        ctx.fill();
        // Inner ear
        ctx.beginPath();
        ctx.moveTo(earX, earY + r * 0.08);
        ctx.lineTo(earX + side * r * 0.18, earY + r * 0.32);
        ctx.lineTo(earX - side * r * 0.04, earY + r * 0.30);
        ctx.closePath();
        ctx.fillStyle = '#ff9eb8';
        ctx.globalAlpha = 0.6;
        ctx.fill();
        ctx.globalAlpha = 1;
      });
      // Whiskers
      [-1, 1].forEach(side => {
        for (let w = 0; w < 3; w++) {
          ctx.beginPath();
          const wy = eyeY + eyeR * 2 + w * eyeR * 0.8;
          ctx.moveTo(cx + side * eyeOff * 0.6, wy);
          ctx.lineTo(cx + side * r * 0.7, wy + (w - 1) * eyeR * 0.6);
          ctx.strokeStyle = 'rgba(45,32,48,0.3)';
          ctx.lineWidth = 1.2;
          ctx.stroke();
        }
      });
    } else if (vid === 'rabbit') {
      // Rabbit ears (tall ovals)
      [-1, 1].forEach(side => {
        ctx.save();
        ctx.beginPath();
        ctx.ellipse(cx + side * r * 0.28, cy - r * 0.95, r * 0.14, r * 0.42, side * 0.15, 0, Math.PI * 2);
        ctx.fillStyle = col;
        ctx.fill();
        // Inner ear
        ctx.beginPath();
        ctx.ellipse(cx + side * r * 0.28, cy - r * 0.90, r * 0.08, r * 0.30, side * 0.15, 0, Math.PI * 2);
        ctx.fillStyle = '#ffb8d0';
        ctx.globalAlpha = 0.5;
        ctx.fill();
        ctx.restore();
      });
    } else if (vid === 'bear') {
      // Bear ears (small circles)
      [-1, 1].forEach(side => {
        ctx.beginPath();
        ctx.arc(cx + side * r * 0.48, cy - r * 0.62, r * 0.18, 0, Math.PI * 2);
        ctx.fillStyle = _darken(col, 30);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx + side * r * 0.48, cy - r * 0.62, r * 0.10, 0, Math.PI * 2);
        ctx.fillStyle = _lighten(col, 40);
        ctx.fill();
      });
      // Bear nose (oval)
      ctx.beginPath();
      ctx.ellipse(cx, eyeY + r * 0.14, eyeR * 1.2, eyeR * 0.8, 0, 0, Math.PI * 2);
      ctx.fillStyle = '#4a3040';
      ctx.fill();
    }

    ctx.restore();

    // ── Specular highlight ────────────────────────────────────
    const spec = ctx.createRadialGradient(cx - r * 0.28, cy - r * 0.35, 0, cx, cy, r);
    spec.addColorStop(0,   'rgba(255,255,255,0.55)');
    spec.addColorStop(0.4, 'rgba(255,255,255,0.08)');
    spec.addColorStop(1,   'rgba(255,255,255,0)');
    ctx.save();
    ctx.beginPath();
    body.buildPath(ctx);
    ctx.fillStyle = spec;
    ctx.fill();
    ctx.restore();
  }

  // ──────────────────────────────────────────────────────────
  // SLIME RENDERER
  // ──────────────────────────────────────────────────────────
  _drawSlime() {
    if (!this.body) return;
    const ctx  = this.ctx;
    const body = this.body;
    const t    = performance.now() / 1000;
    const cx   = body.cx, cy = body.cy, r = body.radius;
    const col  = this.variant?.wax || '#55efc4';
    const hasGlitter = this.variant?.id === 'glitter';
    const isCloud    = this.variant?.id === 'cloud';

    this._drawShadow(cx, cy + r * 0.15, r);

    // ── Slime base ───────────────────────────────────────────
    ctx.save();
    ctx.beginPath();
    body.buildPath(ctx);

    // Flat-ish shape gradient (slime sits flat)
    const sg = ctx.createRadialGradient(cx - r * 0.2, cy - r * 0.3, 0, cx, cy + r * 0.15, r * 1.1);
    sg.addColorStop(0,   _lighten(col, 50) + 'ee');
    sg.addColorStop(0.45, col + 'dd');
    sg.addColorStop(0.85, _darken(col, 30) + 'cc');
    sg.addColorStop(1,   _darken(col, 55) + '88');
    ctx.fillStyle = sg;
    ctx.fill();

    // ── Cloud texture ─────────────────────────────────────────
    if (isCloud) {
      ctx.globalAlpha = 0.22;
      for (let i = 0; i < 8; i++) {
        const ca   = (i / 8) * Math.PI * 2 + t * 0.3;
        const cdst = r * 0.38;
        const ccx  = cx + Math.cos(ca) * cdst;
        const ccy  = cy + Math.sin(ca) * cdst * 0.55;
        const cr   = r * (0.22 + 0.1 * Math.sin(i * 2.1));
        ctx.beginPath();
        ctx.arc(ccx, ccy, cr, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.8)';
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    // ── Swirl pattern ─────────────────────────────────────────
    if (Math.abs(this.swirl) > 0.5) {
      const swirlCount = Math.min(6, Math.floor(Math.abs(this.swirl)));
      ctx.save();
      ctx.beginPath();
      body.buildPath(ctx);
      ctx.clip();
      for (let s = 0; s < swirlCount; s++) {
        const sAngle  = (s / swirlCount) * Math.PI * 2 + this.swirl * 0.4;
        const sGrad   = ctx.createConicGradient
          ? ctx.createConicGradient(sAngle, cx, cy)
          : null;
        if (sGrad) {
          sGrad.addColorStop(0,   'rgba(255,255,255,0.12)');
          sGrad.addColorStop(0.5, 'rgba(0,0,0,0.0)');
          sGrad.addColorStop(1,   'rgba(255,255,255,0.06)');
          ctx.fillStyle   = sGrad;
          ctx.globalAlpha = 0.7;
          ctx.fill();
        }
      }
      ctx.restore();
      ctx.globalAlpha = 1;
    }

    // ── Glitter particles ─────────────────────────────────────
    if (hasGlitter) {
      ctx.save();
      ctx.beginPath();
      body.buildPath(ctx);
      ctx.clip();
      const glitterColors = ['#ffffffcc','#ffe0f0cc','#e0efffcc','#f0ffd0cc'];
      for (let g = 0; g < 38; g++) {
        const ga   = (g * 137.508 * Math.PI / 180) + t * 1.2;
        const gd   = r * ((g * 0.618) % 0.88);
        const gx   = cx + Math.cos(ga) * gd;
        const gy_  = cy + Math.sin(ga) * gd * 0.75;
        const gs   = 1.2 + 1.4 * Math.abs(Math.sin(ga * 3 + t * 2));
        const blink = 0.5 + 0.5 * Math.sin(t * 4 + g);
        ctx.save();
        ctx.globalAlpha = blink * 0.9;
        ctx.translate(gx, gy_);
        ctx.rotate(ga + t * 2);
        ctx.fillStyle = glitterColors[g % glitterColors.length];
        ctx.fillRect(-gs, -gs * 0.3, gs * 2, gs * 0.6);
        ctx.fillRect(-gs * 0.3, -gs, gs * 0.6, gs * 2);
        ctx.restore();
      }
      ctx.restore();
      ctx.globalAlpha = 1;
    }

    // ── Poke dent ────────────────────────────────────────────
    if (this.pressActive && this.pressPoint) {
      const px   = this.pressPoint.x;
      const py   = this.pressPoint.y;
      const pdst = Math.hypot(px - cx, py - cy);
      if (pdst < r * 0.95) {
        const dg = ctx.createRadialGradient(px, py, 0, px, py, r * 0.3);
        dg.addColorStop(0,   'rgba(0,0,0,0.30)');
        dg.addColorStop(0.5, 'rgba(0,0,0,0.10)');
        dg.addColorStop(1,   'rgba(0,0,0,0)');
        ctx.beginPath();
        body.buildPath(ctx);
        ctx.fillStyle = dg;
        ctx.fill();

        // Slime ripple rings
        const rippleCount = 3;
        for (let rp = 0; rp < rippleCount; rp++) {
          const rAge = ((t * 1.5 + rp / rippleCount) % 1);
          const rr   = r * 0.28 * rAge;
          ctx.beginPath();
          ctx.arc(px, py, rr, 0, Math.PI * 2);
          ctx.strokeStyle = _lighten(col, 40) + Math.floor((1 - rAge) * 80).toString(16).padStart(2,'0');
          ctx.lineWidth   = 2 * (1 - rAge);
          ctx.stroke();
        }
      }
    }

    // ── Glossy surface overlay ────────────────────────────────
    const glossG = ctx.createRadialGradient(cx - r * 0.25, cy - r * 0.38, 0, cx - r * 0.1, cy - r * 0.15, r * 0.6);
    glossG.addColorStop(0,   'rgba(255,255,255,0.65)');
    glossG.addColorStop(0.4, 'rgba(255,255,255,0.12)');
    glossG.addColorStop(1,   'rgba(255,255,255,0)');
    ctx.beginPath();
    body.buildPath(ctx);
    ctx.fillStyle = glossG;
    ctx.fill();

    // ── Edge rim light ────────────────────────────────────────
    ctx.beginPath();
    body.buildPath(ctx);
    ctx.strokeStyle = _lighten(col, 30) + '55';
    ctx.lineWidth   = 3;
    ctx.stroke();

    ctx.restore();
  }

  // ──────────────────────────────────────────────────────────
  // CELEBRATE TEXT OVERLAY
  // ──────────────────────────────────────────────────────────
  _drawCelebrateText() {
    const ctx     = this.ctx;
    const alpha   = Math.min(1, this.makeCelebrate / 30);
    const scale   = 1 + 0.3 * Math.sin((90 - this.makeCelebrate) * 0.15);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(this.CX, this.CY * 0.5);
    ctx.scale(scale, scale);
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.font         = `bold ${Math.round(this.W * 0.09)}px sans-serif`;
    ctx.fillStyle    = '#ffffff';
    ctx.shadowColor  = '#ff6eb4';
    ctx.shadowBlur   = 28;
    ctx.fillText('완성! 🎉', 0, 0);
    ctx.restore();
  }
}

// ──────────────────────────────────────────────────────────────
// COLOUR UTILITIES  (pure functions, no DOM / canvas deps)
// ──────────────────────────────────────────────────────────────

/** Parse any CSS hex colour to {r,g,b} */
function _hexToRgb(hex) {
  hex = hex.replace('#', '');
  if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
  const n = parseInt(hex.substring(0, 6), 16);
  return { r: (n >> 16) & 0xff, g: (n >> 8) & 0xff, b: n & 0xff };
}

/** Return brighter hex colour (amount 0‥255) */
function _lighten(hex, amount) {
  if (!hex || !hex.startsWith('#')) return hex || '#ffffff';
  const { r, g, b } = _hexToRgb(hex);
  return '#' + [r, g, b]
    .map(c => Math.round(Math.min(255, c + amount)).toString(16).padStart(2, '0'))
    .join('');
}

/** Return darker hex colour (amount 0‥255) */
function _darken(hex, amount) {
  if (!hex || !hex.startsWith('#')) return hex || '#000000';
  const { r, g, b } = _hexToRgb(hex);
  return '#' + [r, g, b]
    .map(c => Math.round(Math.max(0, c - amount)).toString(16).padStart(2, '0'))
    .join('');
}

document.addEventListener('DOMContentLoaded', () => new App());
